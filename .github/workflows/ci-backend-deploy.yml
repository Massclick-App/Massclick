name: Build & Deploy Backend (Prod)

on:
  push:
    branches:
      - prod
    paths:
      - 'server/**'
      - '.github/workflows/backend-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }} \
            '/home/admin/scripts/backend.sh prod'

      - name: Discord notification on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "❌ **Backend Deployment Failed (Prod)**",
              "embeds": [{
                "color": 16711680,
                "title": "Deploy Failed",
                "description": "Backend deployment failed. Check health check or docker status.",
                "fields": [
                  {"name": "Branch", "value": "prod", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Action", "value": "[View Logs](https://github.com/Massclick-App/Massclick/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'

      - name: Discord notification on success
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "✅ **Backend Deployed Successfully (Prod)**",
              "embeds": [{
                "color": 65280,
                "title": "Deploy Success",
                "description": "Backend deployed and health check passed",
                "fields": [
                  {"name": "Branch", "value": "prod", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true}
                ]
              }]
            }'
