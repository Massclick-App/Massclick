name: Build & Deploy Frontend (Prod)

on:
  push:
    branches:
      - prod
    paths:
      - 'client/ui-app/**'
      - '.github/workflows/build-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for frontend changes
        id: frontend_changes
        run: |
          if git diff --quiet HEAD~1 HEAD -- client/ui-app/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  No frontend code changes detected, skipping build"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend changes detected, proceeding with build"
          fi

      - name: Setup Node.js
        if: steps.frontend_changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        if: steps.frontend_changes.outputs.changed == 'true'
        working-directory: client/ui-app
        run: npm install --legacy-peer-deps

      - name: Build project
        if: steps.frontend_changes.outputs.changed == 'true'
        working-directory: client/ui-app
        run: CI=false npm run build

      - name: Setup SSH key
        if: steps.frontend_changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        if: steps.frontend_changes.outputs.changed == 'true'
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244" \
            client/ui-app/build/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }}:/var/www/massclickQA/client/ui-app/build/

      - name: Reload Nginx
        if: steps.frontend_changes.outputs.changed == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }} \
            'sudo /bin/systemctl reload nginx'

      - name: Discord notification on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "❌ **Frontend Build Failed (Prod)**",
              "embeds": [{
                "color": 16711680,
                "title": "Build Failed",
                "description": "Frontend build or deployment failed",
                "fields": [
                  {"name": "Branch", "value": "prod", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Action", "value": "[View Logs](https://github.com/Massclick-App/Massclick/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'

      - name: Discord notification on success
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "✅ **Frontend Deployed Successfully (Prod)**",
              "embeds": [{
                "color": 65280,
                "title": "Deploy Success",
                "description": "Frontend built and deployed to production",
                "fields": [
                  {"name": "Branch", "value": "prod", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true}
                ]
              }]
            }'
