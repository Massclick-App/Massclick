name: Build & Deploy Frontend (Prod)

on:
  push:
    branches:
      - prod
    paths:
      - 'client/ui-app/**'
      - '.github/workflows/build-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: client/ui-app
        run: npm install --legacy-peer-deps

      - name: Build project
        working-directory: client/ui-app
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_OAUTH_CLIENT_ID: ${{ secrets.REACT_APP_OAUTH_CLIENT_ID }}
          REACT_APP_OAUTH_CLIENT_SECRET: ${{ secrets.REACT_APP_OAUTH_CLIENT_SECRET }}
        run: CI=false npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Backup current frontend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }} \
            'cp -r /var/www/massclickQA/client/ui-app/build /var/www/massclickQA/client/ui-app/build.backup'

      - name: Deploy to server
        run: |
          rsync -avz --delete --chown=deploy:deploy \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244" \
            client/ui-app/build/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }}:/var/www/massclickQA/client/ui-app/build/

      - name: Health check frontend
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }} \
            'sleep 2 && curl -f -s http://localhost/index.html > /dev/null && echo "✅ Frontend healthy" || exit 1'

      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }} \
            'sudo /bin/systemctl reload nginx && echo "✅ Nginx reloaded"'

      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, rolling back..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p 2244 \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.SERVER_HOST }} \
            'rm -rf /var/www/massclickQA/client/ui-app/build && \
             mv /var/www/massclickQA/client/ui-app/build.backup /var/www/massclickQA/client/ui-app/build && \
             sudo /bin/systemctl reload nginx && \
             echo "✅ Rollback completed"'

      - name: Discord notification on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "❌ **Frontend Deployment Failed (Prod)**",
              "embeds": [{
                "color": 16711680,
                "title": "Deployment Failed & Rolled Back",
                "description": "Frontend deployment failed. Previous version restored automatically.",
                "fields": [
                  {"name": "Status", "value": "🔄 Rolled back to previous version", "inline": false},
                  {"name": "Branch", "value": "prod", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true},
                  {"name": "Action", "value": "[View Logs](https://github.com/Massclick-App/Massclick/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'

      - name: Discord notification on success
        if: success()
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H 'Content-Type: application/json' \
            -d '{
              "content": "✅ **Frontend Deployed Successfully (Prod)**",
              "embeds": [{
                "color": 65280,
                "title": "Deploy Success",
                "description": "Frontend built and deployed to production",
                "fields": [
                  {"name": "Branch", "value": "prod", "inline": true},
                  {"name": "Commit", "value": "${{ github.sha }}", "inline": true}
                ]
              }]
            }'
